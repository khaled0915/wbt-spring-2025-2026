<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Khaled Saifullah Chy</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contact.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Khaled Saifullah</div>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="educations.html">Education</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="page-title">
                <h1>Contact Me</h1>
            </div>

            <!-- Contact Form -->
            <section>
                <form method="post">
                    <fieldset>
                        <legend>Contact Form</legend>

                        <table>

                            <tr>
                                <td><label for="firstName">First Name:</label></td>
                                <td><input type="text" id="firstName" name="firstName" required></td>
                            </tr>

                            <tr>
                                <td><label for="lastName">Last Name:</label></td>
                                <td><input type="text" id="lastName" name="lastName" required></td>
                            </tr>

                            <tr>
                                <td><label>Gender:</label></td>
                                <td>
                                    <input type="radio" name="gender" value="male" required> Male
                                    <input type="radio" name="gender" value="female"> Female
                                </td>
                            </tr>

                            <tr>
                                <td><label for="email">Email:</label></td>
                                <td><input type="email" id="email" name="email" required></td>
                            </tr>

                            <tr>
                                <td><label for="company">Company:</label></td>
                                <td><input type="text" id="company" name="company"></td>
                            </tr>

                            <tr>
                                <td><label>Reason of Contact:</label></td>
                                <td>
                                    <input type="radio" name="reason" value="projects" required> Projects
                                    <input type="radio" name="reason" value="thesis"> Thesis
                                    <input type="radio" name="reason" value="job"> Job
                                </td>
                            </tr>

                            <tr>
                                <td><label>Topics:</label></td>
                                <td>
                                    <input type="checkbox" name="topics" value="web-development"> Web Development
                                    <input type="checkbox" name="topics" value="mobile-development"> Mobile Development
                                    <input type="checkbox" name="topics" value="ai-ml-development"> AI/ML Development
                                </td>
                            </tr>

                            <tr>
                                <td><label for="consultationDate">Consultation Date:</label></td>
                                <td><input type="date" id="consultationDate" name="consultationDate" required></td>
                            </tr>

                            <tr>
                                <td></td>
                                <td>
                                    <input type="submit" value="Submit">
                                    <input type="reset">
                                </td>
                            </tr>

                        </table>

                    </fieldset>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="social-links">

                <a href="https://www.facebook.com/saifullah.khaled.7165/" target="_blank"><img src="../Resources/facebook.png" alt="Facebook" width="20"> Facebook</a>
                <a href="https://khaledsaifullah-omnitrix-portfolio.netlify.app/" target="_blank">🌐 Portfolio</a>
            </div>
            
        </div>
    </footer>
</body>
</html>
