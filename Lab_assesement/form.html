<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>

    <link rel="stylesheet" href="form.css">
</head>
<body>

    

                <form method="post">

                    <fieldset>
                        <legend class="head">Donor Information</legend>

                         <table>
                        <tr>
                            <td>
                                <label for="firstName"> first Name <span class="ast">*</span></label>
                            </td>
                             <td><input type="text" id="name" name="name" required></td>
                        </tr>

                        <tr>
                            <td>
                                <label for="lastName"> last Name <span class="ast">*</span></label>
                            </td>
                             <td><input type="text" id="lname" name="lname" required></td>
                        </tr>

                        <tr>
                            <td>
                                <label for="company"> Company </label>
                            </td>
                             <td><input type="text" id="company" name="company"></td>
                        </tr>

                        <tr>
                            <td>
                                <label for="address1"> Address 1 <span class="ast">*</span></label>
                            </td>
                             <td><input type="text" id="address1" name="address1" required></td>
                        </tr>

                        <tr>
                            <td>
                                <label for="address2"> Address 2 </label>
                            </td>
                             <td><input type="text" id="address2" name="address2"></td>
                        </tr>
                        <tr>
                            <td>
                                <label for="city"> City <span class="ast">*</span></label>
                            </td>
                             <td><input type="text" id="city" name="city" required></td>
                        </tr>
                        <tr>
                            <td>
                                <label for="state"> State <span class="ast">*</span></label>
                            </td>
                             <td>
                                <select id="state" name="state" required>
                                    <option value="">Select State</option>
                                    <option value="DHK">Dhaka</option>
                                    <option value="TNT">Toronto</option>
                                    <option value="LND">london</option>
                                </select>
                             </td>
                        </tr>

                        <tr>
                            <td>
                                <label for="zip"> Zip Code <span class="ast">*</span></label>
                            </td>
                             <td><input type="number" id="zip" name="zip" required></td>
                        </tr>

                        <tr>
                            <td>
                                <label for="country"> Country <span class="ast">*</span></label>
                            </td>
                             <td>
                                <select id="country" name="country" required>
                                    <option value="">Select Country</option>
                                    <option value="BD">Bangladesh</option>
                                    <option value="CA">Canada</option>
                                    <option value="UK">United Kingdom</option>
                                </select>
                             </td>
                        </tr>

                        <tr>
                            <td>
                                <label for="phone"> Phone </label>
                            </td>
                             <td><input type="tel" id="phone" name="phone"></td>
                        </tr>

                        <tr>
                            <td>
                                <label for="fax"> Fax </label>
                            </td>
                             <td><input type="tel" id="fax" name="fax"></td>
                        </tr>

                        <tr>
                            <td>
                                <label for="email"> Email <span class="ast">*</span></label>
                            </td>
                             <td><input type="email" id="email" name="email" required></td>
                        </tr>

                        <tr>
                            <td>
                                <label for="donation"> Donation Amount <span class="ast">*</span>
                                <br>(check a button or type in your amount)</label>
                            </td>
                             <td>
                                <input type="radio" name="none" value="none">None
                                <input type="radio" name="donation" value="50" required> $50 
                                <input type="radio" name="donation" value="75"> $75 
                                <input type="radio" name="donation" value="100"> $100 
                                <input type="radio" name="donation" value="250"> $250 
                                <input type="radio" name="donation" value="other"> Other
                             </td>
                        </tr>

                        <tr>
                            <td></td>
                             <td>
                               
                                <label for="other"> Other Amount $ </label>
                                <input type="number" id="other" name="other">
                             </td>
                        </tr>

                        <tr>
                            <td>
                                <label for="recurring"> Recurring Donation <br>(check if yes) </label>
                            </td>
                             <td>
                                <input type="checkbox" id="recurring" name="recurring"> I am interested in giving on a regular basis <br>
                             
                             </td>
                        </tr>

                        <tr>
                            <td>
                                <label  for="monthly"> Monthly Credit Card $

                                    <span>
                                        
                                       
                                    </span>
                                    
                                </label>
                            </td>
                             <td>
                                <input type="text"> 
                                
                             </td>
                             <td>for</td>
                             <td><input type="text"> months </td>
                        </tr>
                    </table>


                    </fieldset>


                   
                </form>




            





        </div>
        
            





           

        

    </div>


    
</body>
</html>
